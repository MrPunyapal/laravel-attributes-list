ate\\Database\\Eloquent\\Collection;\n\nclass PostCollection extends Collection\n{\n    public function published(): static\n    {\n        return $this-&gt;filter(fn ($post) =&gt; $post-&gt;is_published);\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"WithoutTimestamps","path":"attributes\/eloquent\/WithoutTimestamps.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Disable timestamps","html":"\u003Ch1\u003E\u003Ccode\u003E#[WithoutTimestamps]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Disables automatic \u003Ccode\u003Ecreated_at\u003C\/code\u003E and \u003Ccode\u003Eupdated_at\u003C\/code\u003E timestamp management for the model.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\WithoutTimestamps\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\WithoutTimestamps;\nuse Illuminate\\Database\\Eloquent\\Model;\n\n#[WithoutTimestamps]\nclass EventLog extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"WithoutIncrementing","path":"attributes\/eloquent\/WithoutIncrementing.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Disable auto-incrementing IDs","html":"\u003Ch1\u003E\u003Ccode\u003E#[WithoutIncrementing]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Disables auto-incrementing primary keys for the model.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\WithoutIncrementing\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\WithoutIncrementing;\nuse Illuminate\\Database\\Eloquent\\Model;\n\n#[WithoutIncrementing]\nclass ApiToken extends Model\n{\n    protected $keyType = 'string';\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"ScopedBy","path":"attributes\/eloquent\/ScopedBy.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Apply global scope(s) to the model","html":"\u003Ch1\u003E\u003Ccode\u003E#[ScopedBy]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Applies one or more global scopes to the model automatically.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\ScopedBy\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\ScopedBy;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse App\\Models\\Scopes\\ActiveScope;\nuse App\\Models\\Scopes\\PublishedScope;\n\n#[ScopedBy([ActiveScope::class, PublishedScope::class])]\nclass Post extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E\/\/ App\\Models\\Scopes\\ActiveScope\nuse Illuminate\\Database\\Eloquent\\Builder;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse Illuminate\\Database\\Eloquent\\Scope;\n\nclass ActiveScope implements Scope\n{\n    public function apply(Builder $builder, Model $model): void\n    {\n        $builder-&gt;where('is_active', true);\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"ObservedBy","path":"attributes\/eloquent\/ObservedBy.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Register model observer(s)","html":"\u003Ch1\u003E\u003Ccode\u003E#[ObservedBy]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Registers one or more observer classes for the Eloquent model.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\ObservedBy\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\ObservedBy;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse App\\Observers\\UserObserver;\n\n#[ObservedBy([UserObserver::class])]\nclass User extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E\/\/ App\\Observers\\UserObserver\nclass UserObserver\n{\n    public function created(User $user): void\n    {\n        \/\/ Send welcome email...\n    }\n\n    public function deleted(User $user): void\n    {\n        \/\/ Clean up related data...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"DateFormat","path":"attributes\/eloquent\/DateFormat.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Define the date format for model timestamps","html":"\u003Ch1\u003E\u003Ccode\u003E#[DateFormat]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the format used when storing and retrieving date\/timestamp columns.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\DateFormat\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\DateFormat;\nuse Illuminate\\Database\\Eloquent\\Model;\n\n#[DateFormat('U')]\nclass Event extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E\/\/ Using a custom date format string\n#[DateFormat('Y-m-d')]\nclass Appointment extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Scope","path":"attributes\/eloquent\/Scope.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Mark a method as a local query scope","html":"\u003Ch1\u003E\u003Ccode\u003E#[Scope]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a model method as a local query scope, allowing it to be called without the \u003Ccode\u003Escope\u003C\/code\u003E prefix.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\Scope\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\Scope;\nuse Illuminate\\Database\\Eloquent\\Builder;\nuse Illuminate\\Database\\Eloquent\\Model;\n\nclass Post extends Model\n{\n    #[Scope]\n    public function published(Builder $query): void\n    {\n        $query-&gt;where('is_published', true);\n    }\n\n    #[Scope]\n    public function ofType(Builder $query, string $type): void\n    {\n        $query-&gt;where('type', $type);\n    }\n}\n\n\/\/ Usage:\nPost::query()-&gt;published()-&gt;ofType('article')-&gt;get();\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Boot","path":"attributes\/eloquent\/Boot.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Mark a trait method as a model boot hook","html":"\u003Ch1\u003E\u003Ccode\u003E#[Boot]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a trait method as a model boot hook. The method is automatically called when the model class is booted.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\Boot\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\Boot;\nuse Illuminate\\Database\\Eloquent\\Model;\n\ntrait HasSlug\n{\n    #[Boot]\n    public static function bootHasSlug(): void\n    {\n        static::creating(function (Model $model) {\n            $model-&gt;slug = str($model-&gt;title)-&gt;slug();\n        });\n    }\n}\n\nclass Post extends Model\n{\n    use HasSlug;\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Initialize","path":"attributes\/eloquent\/Initialize.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Mark a trait method as a model initialize hook","html":"\u003Ch1\u003E\u003Ccode\u003E#[Initialize]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a trait method as a model initialize hook. The method is automatically called when a new model instance is created.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\Initialize\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\Initialize;\nuse Illuminate\\Database\\Eloquent\\Model;\n\ntrait HasDefaultStatus\n{\n    #[Initialize]\n    public function initializeHasDefaultStatus(): void\n    {\n        $this-&gt;attributes['status'] ??= 'draft';\n    }\n}\n\nclass Post extends Model\n{\n    use HasDefaultStatus;\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"UseEloquentBuilder","path":"attributes\/eloquent\/UseEloquentBuilder.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Specify a custom Eloquent builder class","html":"\u003Ch1\u003E\u003Ccode\u003E#[UseEloquentBuilder]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Specifies a custom Eloquent builder class to use for the model, replacing the default builder.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\UseEloquentBuilder\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\UseEloquentBuilder;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse App\\Builders\\PostBuilder;\n\n#[UseEloquentBuilder(PostBuilder::class)]\nclass Post extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E\/\/ App\\Builders\\PostBuilder\nuse Illuminate\\Database\\Eloquent\\Builder;\n\nclass PostBuilder extends Builder\n{\n    public function published(): static\n    {\n        return $this-&gt;where('is_published', true);\n    }\n\n    public function featured(): static\n    {\n        return $this-&gt;where('is_featured', true);\n    }\n}\n\n\/\/ Usage:\nPost::query()-&gt;published()-&gt;featured()-&gt;get();\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"UseFactory","path":"attributes\/eloquent\/UseFactory.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Specify the factory class for the model","html":"\u003Ch1\u003E\u003Ccode\u003E#[UseFactory]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Specifies the factory class to use for the model, overriding the default factory resolution.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\UseFactory\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\UseFactory;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse Database\\Factories\\PostFactory;\n\n#[UseFactory(PostFactory::class)]\nclass Post extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"UsePolicy","path":"attributes\/eloquent\/UsePolicy.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Specify the policy class for the model","html":"\u003Ch1\u003E\u003Ccode\u003E#[UsePolicy]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Specifies the policy class to use for the model, overriding automatic policy discovery.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\UsePolicy\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\UsePolicy;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse App\\Policies\\PostPolicy;\n\n#[UsePolicy(PostPolicy::class)]\nclass Post extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"UseResource","path":"attributes\/eloquent\/UseResource.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Specify the API resource for the model","html":"\u003Ch1\u003E\u003Ccode\u003E#[UseResource]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Specifies the API resource class to use when transforming the model.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\UseResource\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\UseResource;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse App\\Http\\Resources\\PostResource;\n\n#[UseResource(PostResource::class)]\nclass Post extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"UseResourceCollection","path":"attributes\/eloquent\/UseResourceCollection.md","categorySlug":"eloquent-models","categoryName":"Eloquent (Models)","categoryIcon":"📊","description":"Specify the resource collection for the model","html":"\u003Ch1\u003E\u003Ccode\u003E#[UseResourceCollection]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Specifies the API resource collection class to use when transforming a collection of models.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Attributes\\UseResourceCollection\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Attributes\\UseResourceCollection;\nuse Illuminate\\Database\\Eloquent\\Model;\nuse App\\Http\\Resources\\PostCollection;\n\n#[UseResourceCollection(PostCollection::class)]\nclass Post extends Model\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Connection","path":"attributes\/queue\/Connection.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Define queue connection","html":"\u003Ch1\u003E\u003Ccode\u003E#[Connection]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the queue connection to dispatch the job, listener, or notification on.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\Connection\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\Connection;\n\n#[Connection('redis')]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EEnum values are also supported:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse App\\Enums\\QueueConnection;\n\n#[Connection(QueueConnection::Redis)]\nclass ProcessPodcast implements ShouldQueue\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Queue","path":"attributes\/queue\/Queue.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Define queue name","html":"\u003Ch1\u003E\u003Ccode\u003E#[Queue]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the queue name to dispatch the job, listener, or notification onto.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\Queue\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\Queue;\n\n#[Queue('podcasts')]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EEnum values are also supported:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse App\\Enums\\QueueName;\n\n#[Queue(QueueName::Podcasts)]\nclass ProcessPodcast implements ShouldQueue\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Delay","path":"attributes\/queue\/Delay.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Delay execution","html":"\u003Ch1\u003E\u003Ccode\u003E#[Delay]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Delays the job execution by the given number of seconds. Supported on jobs, listeners, notifications, and mailables.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\Delay\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\Delay;\n\n#[Delay(60)]\nclass SendWelcomeEmail implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ Runs 60 seconds after dispatch\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EAlso works on mailables:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Mail\\Mailable;\nuse Illuminate\\Contracts\\Queue\\ShouldQueue;\n\n#[Delay(30)]\nclass WelcomeEmail extends Mailable implements ShouldQueue\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Backoff","path":"attributes\/queue\/Backoff.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Configure retry delay","html":"\u003Ch1\u003E\u003Ccode\u003E#[Backoff]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Configures the delay in seconds between job retry attempts.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\Backoff\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\Backoff;\n\n\/\/ Fixed delay of 10 seconds between retries\n#[Backoff(10)]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EExponential backoff using an array:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E\/\/ 10s, then 30s, then 60s between retries\n#[Backoff([10, 30, 60])]\nclass ProcessPodcast implements ShouldQueue\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Tries","path":"attributes\/queue\/Tries.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Maximum retry attempts","html":"\u003Ch1\u003E\u003Ccode\u003E#[Tries]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the maximum number of times the job should be attempted before failing.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\Tries\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\Tries;\n\n#[Tries(3)]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Timeout","path":"attributes\/queue\/Timeout.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Job timeout duration","html":"\u003Ch1\u003E\u003Ccode\u003E#[Timeout]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the number of seconds the job is allowed to run before it is killed.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\Timeout\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\Timeout;\n\n#[Timeout(120)]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"UniqueFor","path":"attributes\/queue\/UniqueFor.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Unique job duration","html":"\u003Ch1\u003E\u003Ccode\u003E#[UniqueFor]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Ensures only one instance of the job is queued at a time for the given duration (in seconds).\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\UniqueFor\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\UniqueFor;\n\n#[UniqueFor(3600)]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ Only one instance can be queued per hour\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"DeleteWhenMissingModels","path":"attributes\/queue\/DeleteWhenMissingModels.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Delete if models are missing","html":"\u003Ch1\u003E\u003Ccode\u003E#[DeleteWhenMissingModels]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Automatically deletes the job if any of its injected Eloquent models are missing (soft-deleted or not found).\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\DeleteWhenMissingModels\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\DeleteWhenMissingModels;\nuse App\\Models\\Podcast;\n\n#[DeleteWhenMissingModels]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function __construct(\n        public readonly Podcast $podcast\n    ) {}\n\n    public function handle(): void\n    {\n        \/\/ Job is silently deleted if $podcast no longer exists\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"FailOnTimeout","path":"attributes\/queue\/FailOnTimeout.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Mark job as failed on timeout","html":"\u003Ch1\u003E\u003Ccode\u003E#[FailOnTimeout]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks the job as failed when it exceeds its timeout limit, instead of being released back onto the queue.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\FailOnTimeout\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\FailOnTimeout;\nuse Illuminate\\Queue\\Attributes\\Timeout;\n\n#[FailOnTimeout]\n#[Timeout(30)]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ If this runs longer than 30s, the job is marked as failed\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"MaxExceptions","path":"attributes\/queue\/MaxExceptions.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Maximum exception attempts","html":"\u003Ch1\u003E\u003Ccode\u003E#[MaxExceptions]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the maximum number of unhandled exceptions allowed before the job is marked as failed.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\MaxExceptions\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\MaxExceptions;\nuse Illuminate\\Queue\\Attributes\\Tries;\n\n#[Tries(10)]\n#[MaxExceptions(3)]\nclass ProcessPodcast implements ShouldQueue\n{\n    public function handle(): void\n    {\n        \/\/ Job can retry up to 10 times, but fails after 3 unhandled exceptions\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"WithoutRelations","path":"attributes\/queue\/WithoutRelations.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Ignore relations during serialization","html":"\u003Ch1\u003E\u003Ccode\u003E#[WithoutRelations]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Prevents Eloquent model relations from being serialized when the job is queued. Relations will not be restored when the job is executed.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\WithoutRelations\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\WithoutRelations;\nuse App\\Models\\User;\n\n#[WithoutRelations]\nclass SendWelcomeEmail implements ShouldQueue\n{\n    public function __construct(\n        public readonly User $user\n    ) {}\n\n    public function handle(): void\n    {\n        \/\/ $user-&gt;roles will not be pre-loaded\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003ECan also be applied to individual constructor parameters:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Eclass SendWelcomeEmail implements ShouldQueue\n{\n    public function __construct(\n        #[WithoutRelations] public readonly User $user\n    ) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"DebounceFor","path":"attributes\/queue\/DebounceFor.md","categorySlug":"queue-jobs-listeners-notifications-mailables","categoryName":"Queue (Jobs \/ Listeners \/ Notifications \/ Mailables)","categoryIcon":"📦","description":"Debounce job execution for a given duration","html":"\u003Ch1\u003E\u003Ccode\u003E#[DebounceFor]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Debounces job execution — if the same job is dispatched multiple times within the given duration, only the last dispatch runs.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Queue\\Attributes\\DebounceFor\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Contracts\\Queue\\ShouldQueue;\nuse Illuminate\\Queue\\Attributes\\DebounceFor;\n\n#[DebounceFor(seconds: 30, maxWait: 60)]\nclass SyncUserToMailchimp implements ShouldQueue\n{\n    public function __construct(\n        public readonly int $userId\n    ) {}\n\n    public function handle(): void\n    {\n        \/\/ If dispatched multiple times in 30s, only the last dispatch runs\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Signature","path":"attributes\/console\/Signature.md","categorySlug":"console-artisan-commands","categoryName":"Console (Artisan Commands)","categoryIcon":"⚙️","description":"Define command signature","html":"\u003Ch1\u003E\u003Ccode\u003E#[Signature]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the Artisan command signature, including the command name and its arguments and options.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Console\\Attributes\\Signature\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Console\\Attributes\\Signature;\nuse Illuminate\\Console\\Command;\n\n#[Signature('mail:send {user} {--queue}')]\nclass SendMailCommand extends Command\n{\n    public function handle(): void\n    {\n        $user = $this-&gt;argument('user');\n\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Description","path":"attributes\/console\/Description.md","categorySlug":"console-artisan-commands","categoryName":"Console (Artisan Commands)","categoryIcon":"⚙️","description":"Define command description","html":"\u003Ch1\u003E\u003Ccode\u003E#[Description]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Sets the description for the Artisan command, shown in \u003Ccode\u003Ephp artisan list\u003C\/code\u003E.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Console\\Attributes\\Description\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Console\\Attributes\\Description;\nuse Illuminate\\Console\\Attributes\\Signature;\nuse Illuminate\\Console\\Command;\n\n#[Signature('mail:send {user}')]\n#[Description('Send a marketing email to a user')]\nclass SendMailCommand extends Command\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Aliases","path":"attributes\/console\/Aliases.md","categorySlug":"console-artisan-commands","categoryName":"Console (Artisan Commands)","categoryIcon":"⚙️","description":"Define command aliases","html":"\u003Ch1\u003E\u003Ccode\u003E#[Aliases]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines one or more aliases for the Artisan command.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Console\\Attributes\\Aliases\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Console\\Attributes\\Aliases;\nuse Illuminate\\Console\\Attributes\\Signature;\nuse Illuminate\\Console\\Command;\n\n#[Signature('mail:send {user}')]\n#[Aliases(['ms', 'send-mail'])]\nclass SendMailCommand extends Command\n{\n    public function handle(): void\n    {\n        \/\/ Can now run as: php artisan ms {user}\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Usage","path":"attributes\/console\/Usage.md","categorySlug":"console-artisan-commands","categoryName":"Console (Artisan Commands)","categoryIcon":"⚙️","description":"Define additional command usage examples","html":"\u003Ch1\u003E\u003Ccode\u003E#[Usage]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Adds additional usage examples shown in the command's help output.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Console\\Attributes\\Usage\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Console\\Attributes\\Signature;\nuse Illuminate\\Console\\Attributes\\Usage;\nuse Illuminate\\Console\\Command;\n\n#[Signature('mail:send {user}')]\n#[Usage('mail:send 1')]\n#[Usage('mail:send 1 --queue')]\nclass SendMailCommand extends Command\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Help","path":"attributes\/console\/Help.md","categorySlug":"console-artisan-commands","categoryName":"Console (Artisan Commands)","categoryIcon":"⚙️","description":"Define command help text","html":"\u003Ch1\u003E\u003Ccode\u003E#[Help]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Sets the help text for the Artisan command, shown when running \u003Ccode\u003Ephp artisan help {command}\u003C\/code\u003E.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Console\\Attributes\\Help\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Console\\Attributes\\Help;\nuse Illuminate\\Console\\Attributes\\Signature;\nuse Illuminate\\Console\\Command;\n\n#[Signature('mail:send {user}')]\n#[Help('Dispatches a marketing email to the given user ID. Pass --queue to run in background.')]\nclass SendMailCommand extends Command\n{\n    public function handle(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Hidden","path":"attributes\/console\/Hidden.md","categorySlug":"console-artisan-commands","categoryName":"Console (Artisan Commands)","categoryIcon":"⚙️","description":"Hide command from the Artisan list","html":"\u003Ch1\u003E\u003Ccode\u003E#[Hidden]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Hides the command from the \u003Ccode\u003Ephp artisan list\u003C\/code\u003E output. The command can still be run directly.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Console\\Attributes\\Hidden\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Console\\Attributes\\Hidden;\nuse Illuminate\\Console\\Attributes\\Signature;\nuse Illuminate\\Console\\Command;\n\n#[Signature('internal:sync')]\n#[Hidden]\nclass SyncInternalDataCommand extends Command\n{\n    public function handle(): void\n    {\n        \/\/ This command won't appear in `php artisan list`\n        \/\/ but can still be run via: php artisan internal:sync\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Middleware","path":"attributes\/controllers\/Middleware.md","categorySlug":"controllers","categoryName":"Controllers","categoryIcon":"🎛️","description":"Assign middleware to a controller class or action method","html":"\u003Ch1\u003E\u003Ccode\u003E#[Middleware]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Assigns middleware to a controller class or individual action methods. Can be combined with \u003Ccode\u003Eonly\u003C\/code\u003E and \u003Ccode\u003Eexcept\u003C\/code\u003E options.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Routing\\Attributes\\Controllers\\Middleware\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cp\u003EApplied to the entire controller:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Routing\\Attributes\\Controllers\\Middleware;\n\n#[Middleware('auth')]\nclass UserController\n{\n    public function index() { \/* ... *\/ }\n    public function store() { \/* ... *\/ }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EApplied with \u003Ccode\u003Eonly\u003C\/code\u003E \/ \u003Ccode\u003Eexcept\u003C\/code\u003E restrictions:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[Middleware('auth')]\n#[Middleware('throttle:60,1', only: ['store'])]\n#[Middleware('subscribed', except: ['index'])]\nclass UserController\n{\n    public function index() { \/* ... *\/ }\n    public function store() { \/* ... *\/ }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EApplied to individual methods:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[Middleware('auth')]\nclass UserController\n{\n    #[Middleware('verified')]\n    public function store() { \/* ... *\/ }\n\n    public function index() { \/* ... *\/ }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Authorize","path":"attributes\/controllers\/Authorize.md","categorySlug":"controllers","categoryName":"Controllers","categoryIcon":"🎛️","description":"Authorize a controller action via the gate","html":"\u003Ch1\u003E\u003Ccode\u003E#[Authorize]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Authorizes a controller action using the Gate, providing a clean alternative to \u003Ccode\u003EGate::authorize()\u003C\/code\u003E or form request \u003Ccode\u003Eauthorize()\u003C\/code\u003E.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Routing\\Attributes\\Controllers\\Authorize\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse App\\Models\\Comment;\nuse App\\Models\\Post;\nuse Illuminate\\Routing\\Attributes\\Controllers\\Authorize;\n\nclass CommentController\n{\n    #[Authorize('create', [Comment::class, 'post'])]\n    public function store(StoreCommentRequest $request, Post $post)\n    {\n        \/\/ ...\n    }\n\n    #[Authorize('delete', 'comment')]\n    public function destroy(Comment $comment)\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"RedirectTo","path":"attributes\/form-requests\/RedirectTo.md","categorySlug":"form-requests","categoryName":"Form Requests","categoryIcon":"🧪","description":"Define redirect path on validation failure","html":"\u003Ch1\u003E\u003Ccode\u003E#[RedirectTo]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the URL to redirect to when form request validation fails.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Http\\Attributes\\RedirectTo\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Http\\Attributes\\RedirectTo;\nuse Illuminate\\Foundation\\Http\\FormRequest;\n\n#[RedirectTo('\/posts\/create')]\nclass StorePostRequest extends FormRequest\n{\n    public function rules(): array\n    {\n        return [\n            'title' =&gt; ['required', 'string', 'max:255'],\n            'body'  =&gt; ['required', 'string'],\n        ];\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"RedirectToRoute","path":"attributes\/form-requests\/RedirectToRoute.md","categorySlug":"form-requests","categoryName":"Form Requests","categoryIcon":"🧪","description":"Define redirect route on validation failure","html":"\u003Ch1\u003E\u003Ccode\u003E#[RedirectToRoute]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the named route to redirect to when form request validation fails.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Http\\Attributes\\RedirectToRoute\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Http\\Attributes\\RedirectToRoute;\nuse Illuminate\\Foundation\\Http\\FormRequest;\n\n#[RedirectToRoute('posts.create')]\nclass StorePostRequest extends FormRequest\n{\n    public function rules(): array\n    {\n        return [\n            'title' =&gt; ['required', 'string', 'max:255'],\n            'body'  =&gt; ['required', 'string'],\n        ];\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EWith route parameters:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[RedirectToRoute('posts.edit', ['post' =&gt; 1])]\nclass UpdatePostRequest extends FormRequest\n{\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"StopOnFirstFailure","path":"attributes\/form-requests\/StopOnFirstFailure.md","categorySlug":"form-requests","categoryName":"Form Requests","categoryIcon":"🧪","description":"Stop validation on first failure","html":"\u003Ch1\u003E\u003Ccode\u003E#[StopOnFirstFailure]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Stops validation after the first validation failure instead of collecting all errors.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Http\\Attributes\\StopOnFirstFailure\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Http\\Attributes\\StopOnFirstFailure;\nuse Illuminate\\Foundation\\Http\\FormRequest;\n\n#[StopOnFirstFailure]\nclass StorePostRequest extends FormRequest\n{\n    public function rules(): array\n    {\n        return [\n            'title' =&gt; ['required', 'string', 'max:255'],\n            'body'  =&gt; ['required', 'string'],\n        ];\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"ErrorBag","path":"attributes\/form-requests\/ErrorBag.md","categorySlug":"form-requests","categoryName":"Form Requests","categoryIcon":"🧪","description":"Define the error bag name","html":"\u003Ch1\u003E\u003Ccode\u003E#[ErrorBag]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the named error bag to use when storing validation errors for this form request.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Http\\Attributes\\ErrorBag\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Http\\Attributes\\ErrorBag;\nuse Illuminate\\Foundation\\Http\\FormRequest;\n\n#[ErrorBag('login')]\nclass LoginRequest extends FormRequest\n{\n    public function rules(): array\n    {\n        return [\n            'email'    =&gt; ['required', 'email'],\n            'password' =&gt; ['required', 'string'],\n        ];\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EIn the view you can then access errors via the named bag:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-blade\"\u003E@if ($errors-&gt;login-&gt;any())\n    &lt;ul&gt;\n        @foreach ($errors-&gt;login-&gt;all() as $error)\n            &lt;li&gt;{{ $error }}&lt;\/li&gt;\n        @endforeach\n    &lt;\/ul&gt;\n@endif\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"FailOnUnknownFields","path":"attributes\/form-requests\/FailOnUnknownFields.md","categorySlug":"form-requests","categoryName":"Form Requests","categoryIcon":"🧪","description":"Fail if the request contains unknown fields","html":"\u003Ch1\u003E\u003Ccode\u003E#[FailOnUnknownFields]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Fails the form request validation if the request contains any fields not defined in the \u003Ccode\u003Erules()\u003C\/code\u003E method.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Http\\Attributes\\FailOnUnknownFields\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Http\\Attributes\\FailOnUnknownFields;\nuse Illuminate\\Foundation\\Http\\FormRequest;\n\n#[FailOnUnknownFields]\nclass StorePostRequest extends FormRequest\n{\n    public function rules(): array\n    {\n        return [\n            'title' =&gt; ['required', 'string', 'max:255'],\n            'body'  =&gt; ['required', 'string'],\n        ];\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EIf the request contains an unexpected field like \u003Ccode\u003Eis_admin\u003C\/code\u003E, validation will fail automatically.\u003C\/p\u003E\n\u003Chr \/\u003E\n"},{"name":"Seeder","path":"attributes\/testing\/Seeder.md","categorySlug":"testing","categoryName":"Testing","categoryIcon":"🌱","description":"Run a specific seeder class during tests","html":"\u003Ch1\u003E\u003Ccode\u003E#[Seeder]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Runs a specific seeder class before a test. Requires the \u003Ccode\u003ERefreshDatabase\u003C\/code\u003E or \u003Ccode\u003ELazilyRefreshDatabase\u003C\/code\u003E trait.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Testing\\Attributes\\Seeder\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Testing\\Attributes\\Seeder;\nuse Illuminate\\Foundation\\Testing\\RefreshDatabase;\nuse Tests\\TestCase;\nuse Database\\Seeders\\OrderSeeder;\n\nclass OrderTest extends TestCase\n{\n    use RefreshDatabase;\n\n    #[Seeder(OrderSeeder::class)]\n    public function test_orders_are_listed(): void\n    {\n        $response = $this-&gt;get('\/orders');\n\n        $response-&gt;assertOk();\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Seed","path":"attributes\/testing\/Seed.md","categorySlug":"testing","categoryName":"Testing","categoryIcon":"🌱","description":"Run the database seeder during tests","html":"\u003Ch1\u003E\u003Ccode\u003E#[Seed]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Runs the default database seeder before a test. Requires the \u003Ccode\u003ERefreshDatabase\u003C\/code\u003E or \u003Ccode\u003ELazilyRefreshDatabase\u003C\/code\u003E trait.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Testing\\Attributes\\Seed\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Testing\\Attributes\\Seed;\nuse Illuminate\\Foundation\\Testing\\RefreshDatabase;\nuse Tests\\TestCase;\n\nclass OrderTest extends TestCase\n{\n    use RefreshDatabase;\n\n    #[Seed]\n    public function test_orders_are_listed(): void\n    {\n        \/\/ The default DatabaseSeeder runs before this test\n        $response = $this-&gt;get('\/orders');\n\n        $response-&gt;assertOk();\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"SetUp","path":"attributes\/testing\/SetUp.md","categorySlug":"testing","categoryName":"Testing","categoryIcon":"🌱","description":"Mark a trait method as a test setup hook","html":"\u003Ch1\u003E\u003Ccode\u003E#[SetUp]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a trait method as a test set-up hook. The method is automatically called before each test when the trait is used.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Testing\\Attributes\\SetUp\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Testing\\Attributes\\SetUp;\n\ntrait CreatesUser\n{\n    #[SetUp]\n    public function createUser(): void\n    {\n        $this-&gt;user = User::factory()-&gt;create();\n    }\n}\n\nclass UserTest extends TestCase\n{\n    use CreatesUser;\n\n    public function test_user_can_view_profile(): void\n    {\n        $this-&gt;actingAs($this-&gt;user)\n             -&gt;get('\/profile')\n             -&gt;assertOk();\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"TearDown","path":"attributes\/testing\/TearDown.md","categorySlug":"testing","categoryName":"Testing","categoryIcon":"🌱","description":"Mark a trait method as a test teardown hook","html":"\u003Ch1\u003E\u003Ccode\u003E#[TearDown]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a trait method as a test tear-down hook. The method is automatically called after each test when the trait is used.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Testing\\Attributes\\TearDown\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Testing\\Attributes\\TearDown;\n\ntrait CleansUpFiles\n{\n    #[TearDown]\n    public function cleanUpFiles(): void\n    {\n        Storage::disk('local')-&gt;deleteDirectory('test-uploads');\n    }\n}\n\nclass FileUploadTest extends TestCase\n{\n    use CleansUpFiles;\n\n    public function test_file_can_be_uploaded(): void\n    {\n        \/\/ ...\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"UnitTest","path":"attributes\/testing\/UnitTest.md","categorySlug":"testing","categoryName":"Testing","categoryIcon":"🌱","description":"Skip framework boot for individual test methods","html":"\u003Ch1\u003E\u003Ccode\u003E#[UnitTest]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a test method to run without booting the Laravel framework, making it significantly faster. Useful for pure unit tests mixed into a feature test class.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Foundation\\Testing\\Attributes\\UnitTest\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Foundation\\Testing\\Attributes\\UnitTest;\nuse Tests\\TestCase;\n\nclass LocationServiceTest extends TestCase\n{\n    \/\/ This test boots the framework (uses Http facade)\n    public function test_get_coordinates_calls_api(): void\n    {\n        Http::fake([...]);\n        \/\/ ...\n    }\n\n    \/\/ This test skips framework boot entirely — runs much faster\n    #[UnitTest]\n    public function test_get_state_returns_state_from_abbreviation(): void\n    {\n        $service = new LocationService;\n\n        $this-&gt;assertSame('California', $service-&gt;getState('CA'));\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E\u003Cstrong\u003EWarning:\u003C\/strong\u003E Laravel TestCase methods that rely on the container (e.g. facades, \u003Ccode\u003E$this-&gt;app\u003C\/code\u003E) will not work inside \u003Ccode\u003E#[UnitTest]\u003C\/code\u003E methods.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n\u003Chr \/\u003E\n"},{"name":"UseModel","path":"attributes\/factories\/UseModel.md","categorySlug":"factories","categoryName":"Factories","categoryIcon":"🏭","description":"Define model for factory","html":"\u003Ch1\u003E\u003Ccode\u003E#[UseModel]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the Eloquent model class that the factory creates, overriding the default model resolution.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Database\\Eloquent\\Factories\\UseModel\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Database\\Eloquent\\Factories\\Factory;\nuse Illuminate\\Database\\Eloquent\\Factories\\UseModel;\nuse App\\Models\\User;\n\n#[UseModel(User::class)]\nclass UserFactory extends Factory\n{\n    public function definition(): array\n    {\n        return [\n            'name'  =&gt; $this-&gt;faker-&gt;name(),\n            'email' =&gt; $this-&gt;faker-&gt;unique()-&gt;safeEmail(),\n        ];\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Collects","path":"attributes\/api-resources\/Collects.md","categorySlug":"api-resources","categoryName":"API Resources","categoryIcon":"📡","description":"Define resource collection mapping","html":"\u003Ch1\u003E\u003Ccode\u003E#[Collects]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Defines the resource class that a resource collection wraps, used for automatic collection mapping.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Http\\Resources\\Json\\Collects\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Http\\Resources\\Json\\Collects;\nuse Illuminate\\Http\\Resources\\Json\\ResourceCollection;\nuse App\\Http\\Resources\\UserResource;\n\n#[Collects(UserResource::class)]\nclass UserCollection extends ResourceCollection\n{\n    public function toArray($request): array\n    {\n        return parent::toArray($request);\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"PreserveKeys","path":"attributes\/api-resources\/PreserveKeys.md","categorySlug":"api-resources","categoryName":"API Resources","categoryIcon":"📡","description":"Preserve keys in resource output","html":"\u003Ch1\u003E\u003Ccode\u003E#[PreserveKeys]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Preserves the original array keys when serializing a JSON resource collection.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Http\\Resources\\Json\\PreserveKeys\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Http\\Resources\\Json\\JsonResource;\nuse Illuminate\\Http\\Resources\\Json\\PreserveKeys;\n\n#[PreserveKeys]\nclass UserResource extends JsonResource\n{\n    public function toArray($request): array\n    {\n        return [\n            'id'    =&gt; $this-&gt;id,\n            'name'  =&gt; $this-&gt;name,\n            'email' =&gt; $this-&gt;email,\n        ];\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Auth","path":"attributes\/di\/Auth.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject an auth guard instance","html":"\u003Ch1\u003E\u003Ccode\u003E#[Auth]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects an auth guard instance into the constructor or method.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Auth\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Auth;\nuse Illuminate\\Contracts\\Auth\\Guard;\n\nclass UserService\n{\n    public function __construct(\n        #[Auth('web')] private readonly Guard $guard\n    ) {}\n\n    public function currentUser()\n    {\n        return $this-&gt;guard-&gt;user();\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Authenticated","path":"attributes\/di\/Authenticated.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject the currently authenticated user","html":"\u003Ch1\u003E\u003Ccode\u003E#[Authenticated]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects the currently authenticated user from the default guard.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Authenticated\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Authenticated;\nuse App\\Models\\User;\n\nclass ProfileController\n{\n    public function show(\n        #[Authenticated] User $user\n    ) {\n        return view('profile', compact('user'));\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Bind","path":"attributes\/di\/Bind.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Contextually bind to a specific implementation","html":"\u003Ch1\u003E\u003Ccode\u003E#[Bind]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Contextually binds a specific implementation to an interface or abstract type for the annotated parameter.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Bind\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Bind;\nuse App\\Contracts\\PaymentGateway;\nuse App\\Services\\StripeGateway;\n\nclass CheckoutController\n{\n    public function __construct(\n        #[Bind(StripeGateway::class)] private readonly PaymentGateway $gateway\n    ) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Cache","path":"attributes\/di\/Cache.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a cache store instance","html":"\u003Ch1\u003E\u003Ccode\u003E#[Cache]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a specific cache store instance by name.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Cache\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Cache;\nuse Illuminate\\Contracts\\Cache\\Repository;\n\nclass ProductService\n{\n    public function __construct(\n        #[Cache('redis')] private readonly Repository $cache\n    ) {}\n\n    public function find(int $id): mixed\n    {\n        return $this-&gt;cache-&gt;remember(&quot;product:{$id}&quot;, 3600, fn () =&gt; Product::find($id));\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Config","path":"attributes\/di\/Config.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a configuration value","html":"\u003Ch1\u003E\u003Ccode\u003E#[Config]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a configuration value directly into a constructor or method parameter.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Config\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Config;\n\nclass MailService\n{\n    public function __construct(\n        #[Config('mail.from.address')] private readonly string $fromAddress,\n        #[Config('mail.from.name')] private readonly string $fromName\n    ) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Context","path":"attributes\/di\/Context.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a value from the application context","html":"\u003Ch1\u003E\u003Ccode\u003E#[Context]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a value from the application's shared context.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Context\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Context;\n\nclass RequestLogger\n{\n    public function __construct(\n        #[Context('trace_id')] private readonly ?string $traceId\n    ) {}\n\n    public function log(string $message): void\n    {\n        logger()-&gt;info($message, ['trace_id' =&gt; $this-&gt;traceId]);\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EAlso supports hidden context:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[Context('secret_key', hidden: true)] private readonly ?string $secret\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"CurrentUser","path":"attributes\/di\/CurrentUser.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject the currently authenticated user model","html":"\u003Ch1\u003E\u003Ccode\u003E#[CurrentUser]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects the currently authenticated user model instance, resolved via the auth user resolver.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\CurrentUser\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\CurrentUser;\nuse App\\Models\\User;\n\nclass OrderService\n{\n    public function __construct(\n        #[CurrentUser] private readonly ?User $user\n    ) {}\n\n    public function placeOrder(array $data): Order\n    {\n        return $this-&gt;user-&gt;orders()-&gt;create($data);\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E[!NOTE]\nThe \u003Ccode\u003E#[CurrentUser]\u003C\/code\u003E currently just alias of \u003Ccode\u003E#[Authenticated]\u003C\/code\u003E.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n"},{"name":"DB","path":"attributes\/di\/DB.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a database connection instance","html":"\u003Ch1\u003E\u003Ccode\u003E#[DB]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a database connection instance by name.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\DB\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\DB;\nuse Illuminate\\Database\\Connection;\n\nclass ReportService\n{\n    public function __construct(\n        #[DB('pgsql')] private readonly Connection $db\n    ) {}\n\n    public function generateReport(): array\n    {\n        return $this-&gt;db-&gt;select('SELECT * FROM reports');\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E[!NOTE]\nThe \u003Ccode\u003E#[DB]\u003C\/code\u003E currently just alias of \u003Ccode\u003E#[Database]\u003C\/code\u003E.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n"},{"name":"Database","path":"attributes\/di\/Database.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a named database connection","html":"\u003Ch1\u003E\u003Ccode\u003E#[Database]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a named database connection instance. Similar to \u003Ccode\u003E#[DB]\u003C\/code\u003E but also accepts enum values.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Database\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Database;\nuse Illuminate\\Database\\Connection;\n\nclass ReportService\n{\n    public function __construct(\n        #[Database('pgsql')] private readonly Connection $connection\n    ) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EEnum values are also supported:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse App\\Enums\\DatabaseConnection;\n\nclass ReportService\n{\n    public function __construct(\n        #[Database(DatabaseConnection::Pgsql)] private readonly Connection $connection\n    ) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Give","path":"attributes\/di\/Give.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Give a specific binding contextually","html":"\u003Ch1\u003E\u003Ccode\u003E#[Give]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Contextually gives a specific value or binding for the annotated parameter, similar to \u003Ccode\u003E$this-&gt;app-&gt;when(...)-&gt;needs(...)-&gt;give(...)\u003C\/code\u003E.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Give\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Give;\n\nclass NotificationService\n{\n    public function __construct(\n        #[Give('notifications@example.com')] private readonly string $fromEmail\n    ) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EAlso accepts class names (string bindings):\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse App\\Services\\SmsDriver;\n\nclass NotificationService\n{\n    public function __construct(\n        #[Give(SmsDriver::class)] private readonly DriverInterface $driver\n    ) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Log","path":"attributes\/di\/Log.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a logger with a named channel","html":"\u003Ch1\u003E\u003Ccode\u003E#[Log]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a logger instance with an optional named channel for better log organization.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Log\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Log;\nuse Psr\\Log\\LoggerInterface;\n\nclass PaymentService\n{\n    public function __construct(\n        #[Log(channel: 'payments', name: 'custom_logger')] private readonly LoggerInterface $logger\n    ) {}\n\n    public function charge(int $amount): void\n    {\n        $this-&gt;logger-&gt;info('Charging customer', ['amount' =&gt; $amount]);\n        \/\/ Logged under the 'payments' channel\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EWithout a channel name, it injects the default logger:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[Log] private readonly LoggerInterface $logger\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"RouteParameter","path":"attributes\/di\/RouteParameter.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a route parameter value","html":"\u003Ch1\u003E\u003Ccode\u003E#[RouteParameter]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a route parameter value directly into a service constructor or method, resolved from the current request.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\RouteParameter\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\RouteParameter;\nuse App\\Models\\Post;\n\nclass PostService\n{\n    public function __construct(\n        #[RouteParameter('post')] private readonly Post $post\n    ) {}\n\n    public function getComments()\n    {\n        return $this-&gt;post-&gt;comments;\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Scoped","path":"attributes\/di\/Scoped.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Register a class as a scoped singleton in the container","html":"\u003Ch1\u003E\u003Ccode\u003E#[Scoped]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Registers the class as a scoped singleton in the container — shared within a single request\/lifecycle, but fresh for each new request.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Scoped\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Scoped;\n\n#[Scoped]\nclass RequestContext\n{\n    private array $data = [];\n\n    public function set(string $key, mixed $value): void\n    {\n        $this-&gt;data[$key] = $value;\n    }\n\n    public function get(string $key): mixed\n    {\n        return $this-&gt;data[$key] ?? null;\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Singleton","path":"attributes\/di\/Singleton.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Register a class as a singleton in the container","html":"\u003Ch1\u003E\u003Ccode\u003E#[Singleton]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Registers the class as a singleton in the container — shared across the entire application lifecycle.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Singleton\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Singleton;\n\n#[Singleton]\nclass ConfigCache\n{\n    private array $cache = [];\n\n    public function remember(string $key, callable $callback): mixed\n    {\n        return $this-&gt;cache[$key] ??= $callback();\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Storage","path":"attributes\/di\/Storage.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject a storage disk instance","html":"\u003Ch1\u003E\u003Ccode\u003E#[Storage]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects a specific storage disk instance by name.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Storage\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Storage;\nuse Illuminate\\Contracts\\Filesystem\\Filesystem;\n\nclass AvatarService\n{\n    public function __construct(\n        #[Storage('s3')] private readonly Filesystem $disk\n    ) {}\n\n    public function upload(string $path, mixed $contents): void\n    {\n        $this-&gt;disk-&gt;put($path, $contents);\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EEnum values are also supported:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse App\\Enums\\StorageDisk;\n\n#[Storage(StorageDisk::S3)] private readonly Filesystem $disk\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Tag","path":"attributes\/di\/Tag.md","categorySlug":"dependency-injection","categoryName":"Dependency Injection","categoryIcon":"🔌","description":"Inject all bindings tagged with a given tag","html":"\u003Ch1\u003E\u003Ccode\u003E#[Tag]\u003C\/code\u003E\u003C\/h1\u003E\n\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Injects all container bindings registered under a specific tag.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E \u003Ccode\u003EIlluminate\\Container\\Attributes\\Tag\u003C\/code\u003E\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Illuminate\\Container\\Attributes\\Tag;\n\nclass ReportAggregator\n{\n    public function __construct(\n        #[Tag('reports')] private readonly iterable $reporters\n    ) {}\n\n    public function generate(): array\n    {\n        return collect($this-&gt;reporters)\n            -&gt;flatMap(fn ($reporter) =&gt; $reporter-&gt;data())\n            -&gt;all();\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EIn a service provider, register the tagged bindings:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E$this-&gt;app-&gt;tag([SalesReport::class, TrafficReport::class], 'reports');\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"}]};

    var COLORS = [
      'bg-blue-100 text-blue-700',
      'bg-emerald-100 text-emerald-700',
      'bg-violet-100 text-violet-700',
      'bg-amber-100 text-amber-700',
      'bg-pink-100 text-pink-700',
      'bg-sky-100 text-sky-700',
      'bg-orange-100 text-orange-700',
      'bg-teal-100 text-teal-700',
      'bg-rose-100 text-rose-700',
      'bg-indigo-100 text-indigo-700',
    ];
    var colorMap = {};

    function getCategoryColor(slug) {
      if (!colorMap[slug]) {
        var idx = Object.keys(colorMap).length % COLORS.length;
        colorMap[slug] = COLORS[idx];
      }
      return colorMap[slug];
    }

    var activeCategory = 'all';
    var searchQuery    = '';
    var searchTimer    = null;

    function filterBtnClass(active) {
      return active
        ? 'inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-medium bg-[#FF2D20] text-white shadow-sm cursor-pointer transition-all'
        : 'inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-[#FF2D20] hover:text-[#FF2D20] cursor-pointer transition-all';
    }

    function renderFilters() {
      var container = document.getElementById('filters');

      var allBtn = document.createElement('button');
      allBtn.className    = filterBtnClass(true);
      allBtn.textContent  = 'All';
      allBtn.dataset.cat  = 'all';
      container.appendChild(allBtn);

      DATA.categories.forEach(function (cat) {
        var btn = document.createElement('button');
        btn.className   = filterBtnClass(false);
        btn.textContent = cat.icon + ' ' + cat.name;
        btn.dataset.cat = cat.slug;
        container.appendChild(btn);
      });

      container.addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-cat]');
        if (!btn) return;
        activeCategory = btn.dataset.cat;
        container.querySelectorAll('button[data-cat]').forEach(function (b) {
          b.className = filterBtnClass(b.dataset.cat === activeCategory);
        });
        renderGrid();
      });
    }

    function getFiltered() {
      return DATA.attributes.filter(function (attr) {
        var matchCat = activeCategory === 'all' || attr.categorySlug === activeCategory;
        var q        = searchQuery.toLowerCase();
        var matchSearch = !q
          || attr.name.toLowerCase().indexOf(q) !== -1
          || attr.description.toLowerCase().indexOf(q) !== -1
          || attr.categoryName.toLowerCase().indexOf(q) !== -1;
        return matchCat && matchSearch;
      });
    }

    function renderGrid() {
      var grid     = document.getElementById('grid');
      var empty    = document.getElementById('empty');
      var countEl  = document.getElementById('count');
      var filtered = getFiltered();

      grid.innerHTML = '';
      countEl.textContent = filtered.length + ' attribute' + (filtered.length !== 1 ? 's' : '');

      if (filtered.length === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      grid.classList.remove('hidden');
      empty.classList.add('hidden');

      var frag = document.createDocumentFragment();

      filtered.forEach(function (attr) {
        var badgeColor = getCategoryColor(attr.categorySlug);
        var card       = document.createElement('div');
        card.className = 'card bg-white border border-gray-200 rounded-xl p-5 cursor-pointer select-none flex flex-col gap-3';

        // Name row
        var nameRow    = document.createElement('div');
        nameRow.className = 'flex items-start justify-between gap-2';

        var nameSpan       = document.createElement('span');
        nameSpan.className = 'font-mono font-bold text-[15px] text-gray-900 leading-snug break-all';
        nameSpan.textContent = '#[' + attr.name + ']';

        var arrow       = document.createElement('span');
        arrow.className = 'flex-shrink-0 text-gray-300 mt-0.5';
        arrow.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';

        nameRow.appendChild(nameSpan);
        nameRow.appendChild(arrow);

        // Description
        var desc       = document.createElement('p');
        desc.className = 'text-gray-500 text-sm leading-relaxed flex-1';
        desc.textContent = attr.description;

        // Category badge
        var badgeWrap = document.createElement('div');
        var badge     = document.createElement('span');
        badge.className  = 'inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium ' + badgeColor;
        badge.textContent = attr.categoryIcon + ' ' + attr.categoryName;
        badgeWrap.appendChild(badge);

        card.appendChild(nameRow);
        card.appendChild(desc);
        card.appendChild(badgeWrap);

        card.addEventListener('click', (function (a) {
          return function () { openPanel(a); };
        }(attr)));

        frag.appendChild(card);
      });

      grid.appendChild(frag);
    }

    // ─── Side Panel ───────────────────────────────────────────────────────

    var panel    = document.getElementById('panel');
    var backdrop = document.getElementById('backdrop');

    function openPanel(attr) {
      document.getElementById('panel-title').textContent    = '#[' + attr.name + ']';
      document.getElementById('panel-category').textContent = attr.categoryIcon + ' ' + attr.categoryName;

      var content     = document.getElementById('panel-content');
      content.innerHTML = attr.html;

      // Apply syntax highlighting to all code blocks
      content.querySelectorAll('pre code').forEach(function (block) {
        hljs.highlightElement(block);
      });

      panel.classList.add('open');
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('panel-body').scrollTop = 0;
    }

    function closePanel() {
      panel.classList.remove('open');
      backdrop.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('close-panel').addEventListener('click', closePanel);
    backdrop.addEventListener('click', closePanel);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closePanel();
    });

    // ─── Search ───────────────────────────────────────────────────────────

    document.getElementById('search').addEventListener('input', function (e) {
      clearTimeout(searchTimer);
      var val = e.target.value;
      searchTimer = setTimeout(function () {
        searchQuery = val.trim();
        renderGrid();
      }, 150);
    });

    // ─── Boot ─────────────────────────────────────────────────────────────

    renderFilters();
    renderGrid();
  </script>
</body>
</html>
