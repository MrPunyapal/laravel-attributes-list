yCustomAttribute('example')]\nclass SomeClass {}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EYou can restrict where the attribute is allowed to be used:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Euse Attribute;\n\n#[Attribute(Attribute::TARGET_CLASS | Attribute::TARGET_METHOD)]\nclass OnlyForClassesAndMethods\n{\n    public function __construct(public string $label) {}\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Ch3\u003ETarget Constants\u003C\/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EConstant\u003C\/th\u003E\n\u003Cth\u003EDescription\u003C\/th\u003E\n\u003C\/tr\u003E\n\u003C\/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::TARGET_CLASS\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003ECan be applied to classes\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::TARGET_FUNCTION\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003ECan be applied to functions\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::TARGET_METHOD\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003ECan be applied to methods\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::TARGET_PROPERTY\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003ECan be applied to properties\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::TARGET_CLASS_CONSTANT\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003ECan be applied to class constants\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::TARGET_PARAMETER\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003ECan be applied to parameters\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::TARGET_ALL\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003ECan be applied to all declarations (default)\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EAttribute::IS_REPEATABLE\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003EThe attribute may be applied more than once to the same declaration\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003C\/tbody\u003E\n\u003C\/table\u003E\n\u003Chr \/\u003E\n"},{"name":"AllowDynamicProperties","path":"attributes\/php\/AllowDynamicProperties.md","categorySlug":"php-built-in-attributes","categoryName":"PHP Built-in Attributes","categoryIcon":"🐘","description":"Allow dynamic properties on a class without deprecation notice","html":"\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a class to allow dynamic (undeclared) properties without emitting a deprecation notice.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E Built-in PHP (no import required)\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ESince:\u003C\/strong\u003E PHP 8.2\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cp\u003EDynamic properties are deprecated as of PHP 8.2. Without this attribute, assigning to an undeclared property emits a deprecation notice.\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[\\AllowDynamicProperties]\nclass UserSession\n{\n    public string $id;\n}\n\n$session = new UserSession();\n$session-&gt;id = 'abc123';\n$session-&gt;extraData = 'some value'; \/\/ No deprecation notice\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E\u003Cstrong\u003ENote:\u003C\/strong\u003E The effect is inherited. Child classes of a class marked with this attribute will also allow dynamic properties, even without explicitly declaring it.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[\\AllowDynamicProperties]\nclass Base {}\n\nclass Child extends Base {}\n\n$child = new Child();\n$child-&gt;dynamic = true; \/\/ Also allowed\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"Deprecated","path":"attributes\/php\/Deprecated.md","categorySlug":"php-built-in-attributes","categoryName":"PHP Built-in Attributes","categoryIcon":"🐘","description":"Mark a function, method, class, or constant as deprecated","html":"\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a function, method, class, or class constant as deprecated. Using deprecated functionality emits an \u003Ccode\u003EE_USER_DEPRECATED\u003C\/code\u003E notice.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E Built-in PHP (no import required)\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ESince:\u003C\/strong\u003E PHP 8.4\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[\\Deprecated(message: 'use newMethod() instead', since: '2.0')]\nfunction oldMethod(): void\n{\n    \/\/ ...\n}\n\noldMethod(); \/\/ Deprecated: Function oldMethod() is deprecated since 2.0, use newMethod() instead\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Ch3\u003EParameters\u003C\/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EParameter\u003C\/th\u003E\n\u003Cth\u003EType\u003C\/th\u003E\n\u003Cth\u003EDescription\u003C\/th\u003E\n\u003C\/tr\u003E\n\u003C\/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003E$message\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003E\u003Ccode\u003E?string\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003EOptional explanation of the deprecation and\/or replacement\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003E$since\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003E\u003Ccode\u003E?string\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003EOptional string indicating when the deprecation was introduced\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003C\/tbody\u003E\n\u003C\/table\u003E\n\u003Ch3\u003EOn a class\u003C\/h3\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[\\Deprecated(message: 'use NewService instead', since: '3.0')]\nclass OldService\n{\n    \/\/ ...\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Ch3\u003EOn a class constant\u003C\/h3\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Eclass Config\n{\n    #[\\Deprecated(message: 'use Config::NEW_LIMIT instead', since: '1.5')]\n    const OLD_LIMIT = 100;\n\n    const NEW_LIMIT = 200;\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Chr \/\u003E\n"},{"name":"NoDiscard","path":"attributes\/php\/NoDiscard.md","categorySlug":"php-built-in-attributes","categoryName":"PHP Built-in Attributes","categoryIcon":"🐘","description":"Warn when a function's return value is discarded","html":"\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Indicates that the return value of a function or method should not be discarded. Emits a warning if the return value is unused.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E Built-in PHP (no import required)\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ESince:\u003C\/strong\u003E PHP 8.5\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E#[\\NoDiscard('as processing might fail for individual items')]\nfunction processItems(array $items): array\n{\n    \/\/ Returns an array of results\/errors per item\n    return [];\n}\n\nprocessItems($items); \/\/ Warning: return value should be used or cast as (void)\n\n$results = processItems($items); \/\/ OK\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Ch3\u003EParameters\u003C\/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EParameter\u003C\/th\u003E\n\u003Cth\u003EType\u003C\/th\u003E\n\u003Cth\u003EDescription\u003C\/th\u003E\n\u003C\/tr\u003E\n\u003C\/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003E$message\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003E\u003Ccode\u003E?string\u003C\/code\u003E\u003C\/td\u003E\n\u003Ctd\u003EOptional message explaining why the return value should not be discarded\u003C\/td\u003E\n\u003C\/tr\u003E\n\u003C\/tbody\u003E\n\u003C\/table\u003E\n\u003Ch3\u003EIntentionally discarding the return value\u003C\/h3\u003E\n\u003Cp\u003EUse a \u003Ccode\u003E(void)\u003C\/code\u003E cast to suppress the warning explicitly:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E(void) processItems($items); \/\/ Suppresses the warning — PHP 8.5+\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EFor cross-version compatibility (below PHP 8.5), use a \u003Ccode\u003E$_\u003C\/code\u003E variable:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003E$_ = processItems($items); \/\/ No warning on any PHP version\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E\u003Cstrong\u003ENote:\u003C\/strong\u003E \u003Ccode\u003E#[\\NoDiscard]\u003C\/code\u003E can be added even when targeting PHP 8.4 or below — it simply has no effect on older versions.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n\u003Chr \/\u003E\n"},{"name":"Override","path":"attributes\/php\/Override.md","categorySlug":"php-built-in-attributes","categoryName":"PHP Built-in Attributes","categoryIcon":"🐘","description":"Assert that a method or property overrides a parent declaration","html":"\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Indicates that a method or property is intended to override a declaration in a parent class or interface. A compile-time error is emitted if no matching parent declaration exists.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E Built-in PHP (no import required)\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ESince:\u003C\/strong\u003E PHP 8.3 (methods), PHP 8.5 (properties)\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Eclass Base\n{\n    protected function handle(): void {}\n}\n\nclass Child extends Base\n{\n    #[\\Override]\n    protected function handle(): void\n    {\n        \/\/ Guaranteed to override Base::handle()\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EIf the parent method doesn't exist, PHP emits a fatal error:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Eclass Child extends Base\n{\n    #[\\Override]\n    protected function typoInName(): void {} \/\/ Fatal error: no matching parent method\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Ch3\u003EWith properties (PHP 8.5+)\u003C\/h3\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Eclass Base\n{\n    protected string $name;\n}\n\nclass Child extends Base\n{\n    #[\\Override]\n    protected string $name = 'default';\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E\u003Cstrong\u003ENote:\u003C\/strong\u003E Cannot be used on \u003Ccode\u003E__construct()\u003C\/code\u003E.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n\u003Chr \/\u003E\n"},{"name":"ReturnTypeWillChange","path":"attributes\/php\/ReturnTypeWillChange.md","categorySlug":"php-built-in-attributes","categoryName":"PHP Built-in Attributes","categoryIcon":"🐘","description":"Silence return type deprecation notice for cross-version compatibility","html":"\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Silences the deprecation notice emitted when overriding an internal PHP method without declaring a compatible return type, for cross-version PHP compatibility.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E Built-in PHP (no import required)\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ESince:\u003C\/strong\u003E PHP 8.1\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cp\u003EUse this when overriding a PHP internal method but you cannot yet declare the return type due to cross-version compatibility constraints.\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Eclass CustomCollection implements Countable\n{\n    #[\\ReturnTypeWillChange]\n    public function count()\n    {\n        \/\/ Can't declare ': int' here due to PHP version constraints\n        return 0;\n    }\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E\u003Cstrong\u003ENote:\u003C\/strong\u003E This attribute is primarily a migration tool. Once you can target PHP 8.1+ exclusively, add the proper return type declaration and remove this attribute.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n\u003Chr \/\u003E\n"},{"name":"SensitiveParameter","path":"attributes\/php\/SensitiveParameter.md","categorySlug":"php-built-in-attributes","categoryName":"PHP Built-in Attributes","categoryIcon":"🐘","description":"Redact a parameter value from stack traces","html":"\u003Cp\u003E\u003Cstrong\u003EDescription:\u003C\/strong\u003E Marks a function or method parameter as sensitive so its value is redacted (replaced with a \u003Ccode\u003ESensitiveParameterValue\u003C\/code\u003E object) in stack traces and error output.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ENamespace:\u003C\/strong\u003E Built-in PHP (no import required)\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003ESince:\u003C\/strong\u003E PHP 8.2\u003C\/p\u003E\n\u003Ch2\u003EUsage\u003C\/h2\u003E\n\u003Cpre\u003E\u003Ccode class=\"language-php\"\u003Efunction authenticate(\n    string $username,\n    #[\\SensitiveParameter] string $password,\n): bool {\n    \/\/ If an exception is thrown here, $password will NOT appear in the stack trace\n    throw new RuntimeException('Auth failed');\n}\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EWithout \u003Ccode\u003E#[\\SensitiveParameter]\u003C\/code\u003E, the password would be visible in error logs:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode\u003E\/\/ Without attribute:\n#0 file.php(10): authenticate('alice', 'hunter2')\n\n\/\/ With attribute:\n#0 file.php(10): authenticate('alice', Object(SensitiveParameterValue))\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E\u003Cstrong\u003EWarning:\u003C\/strong\u003E The attribute must be applied at the concrete implementation, not just on an interface method. Applying it only to an interface declaration does not protect the implementing class.\u003C\/p\u003E\n\u003C\/blockquote\u003E\n\u003Chr \/\u003E\n"}]};

    // Build slug→color lookup from PHP-assigned colors
    var catColor = {};
    DATA.categories.forEach(function(c) { catColor[c.slug] = c.color; });

    var activeCategory = 'all';
    var searchQuery    = '';
    var searchTimer    = null;
    var activeCard     = null;

    // Safe HTML escaping for innerHTML usage
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── Filters ─────────────────────────────────────────────────────────

    function pillClass(active) {
      return active
        ? 'flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold bg-[#FF2D20] text-white cursor-pointer transition-all'
        : 'flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer transition-all';
    }

    function renderFilters() {
      var container = document.getElementById('filters');

      var html = '<button class="' + pillClass(true) + '" data-cat="all">All</button>';
      DATA.categories.forEach(function(cat) {
        html += '<button class="' + pillClass(false) + '" data-cat="' + esc(cat.slug) + '">' + cat.icon + ' ' + esc(cat.name) + '</button>';
      });
      container.innerHTML = html;

      container.addEventListener('click', function(e) {
        var btn = e.target.closest('button[data-cat]');
        if (!btn) return;
        activeCategory = btn.dataset.cat;
        container.querySelectorAll('button[data-cat]').forEach(function(b) {
          b.className = pillClass(b.dataset.cat === activeCategory);
        });
        renderGrid();
      });
    }

    // ─── Grid ─────────────────────────────────────────────────────────────

    function getFiltered() {
      var q = searchQuery.toLowerCase();
      return DATA.attributes.filter(function(a) {
        return (activeCategory === 'all' || a.categorySlug === activeCategory)
          && (!q || a.name.toLowerCase().indexOf(q) !== -1 || a.description.toLowerCase().indexOf(q) !== -1 || a.categoryName.toLowerCase().indexOf(q) !== -1);
      });
    }

    function renderGrid() {
      var grid     = document.getElementById('grid');
      var empty    = document.getElementById('empty');
      var filtered = getFiltered();

      document.getElementById('count').textContent = filtered.length + ' attribute' + (filtered.length !== 1 ? 's' : '');

      if (!filtered.length) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      grid.classList.remove('hidden');
      empty.classList.add('hidden');

      var html = '';
      filtered.forEach(function(attr) {
        html +=
          '<div class="card bg-white border border-gray-200 rounded-xl p-5 cursor-pointer flex flex-col gap-2.5" data-name="' + esc(attr.name) + '">' +
            '<div class="font-mono font-semibold text-sm text-gray-900">#[' + esc(attr.name) + ']</div>' +
            '<p class="text-gray-500 text-xs leading-relaxed flex-1">' + esc(attr.description) + '</p>' +
            '<span class="self-start inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium ' + catColor[attr.categorySlug] + '">' +
              attr.categoryIcon + ' ' + esc(attr.categoryName) +
            '</span>' +
          '</div>';
      });

      grid.innerHTML = html;

      // Re-attach click handlers and restore active state
      grid.querySelectorAll('.card').forEach(function(card, i) {
        var attr = filtered[i];
        if (activeCard && activeCard.name === attr.name) card.classList.add('active');
        card.addEventListener('click', function() { openPanel(attr, card); });
      });
    }

    // ─── Panel ────────────────────────────────────────────────────────────

    var panel    = document.getElementById('panel');
    var backdrop = document.getElementById('backdrop');

    function openPanel(attr, card) {
      // Update active card highlight
      if (activeCard) {
        var prev = document.querySelector('.card.active');
        if (prev) prev.classList.remove('active');
      }
      activeCard = attr;
      if (card) card.classList.add('active');

      document.getElementById('panel-title').textContent    = '#[' + attr.name + ']';
      document.getElementById('panel-category').textContent = attr.categoryIcon + ' ' + attr.categoryName;

      var content = document.getElementById('panel-content');
      content.innerHTML = attr.html;
      content.querySelectorAll('pre code').forEach(function(b) { hljs.highlightElement(b); });

      panel.classList.add('open');
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('panel-body').scrollTop = 0;
    }

    function closePanel() {
      panel.classList.remove('open');
      backdrop.classList.remove('open');
      document.body.style.overflow = '';
      if (activeCard) {
        var prev = document.querySelector('.card.active');
        if (prev) prev.classList.remove('active');
        activeCard = null;
      }
    }

    document.getElementById('close-panel').addEventListener('click', closePanel);
    backdrop.addEventListener('click', closePanel);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

    // ─── Search ───────────────────────────────────────────────────────────

    document.getElementById('search').addEventListener('input', function(e) {
      clearTimeout(searchTimer);
      var val = e.target.value;
      searchTimer = setTimeout(function() { searchQuery = val.trim(); renderGrid(); }, 150);
    });

    // ─── Boot ─────────────────────────────────────────────────────────────

    renderFilters();
    renderGrid();
  </script>
</body>
</html>
