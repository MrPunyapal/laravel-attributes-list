    <style>

        .hero-title { font-weight: 800; font-size: 3rem; letter-spacing: -2px; margin: 0 0 0.5rem; background: linear-gradient(135deg, #fff 0%, var(--gray-400) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { color: var(--gray-400); font-size: 1.1rem; margin-bottom: 1.5rem; }
        .search-box { background: var(--gray-900); border: 1px solid var(--gray-700); border-radius: 16px; padding: 14px 20px; font-size: 1rem; color: #fff; width: 100%; max-width: 400px; transition: all 0.3s; }
        .search-box:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 45, 32, 0.15); }
        .attr-count { background: rgba(255, 45, 32, 0.15); color: var(--primary); padding: 8px 16px; border-radius: 50px; font-weight: 600; font-size: 0.875rem; display: inline-block; margin-top: 1rem; }

        .category-btn { background: var(--gray-900); border: 1px solid var(--gray-700); color: var(--gray-300); padding: 8px 16px; border-radius: 50px; font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; }
        .category-btn:hover { border-color: var(--gray-500); color: #fff; }
        .category-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .category-section { padding: 2rem 0; }
        .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
        .category-title { font-weight: 700; font-size: 1.3rem; color: #fff; margin: 0; }
        .category-count { background: var(--gray-800); color: var(--gray-400); padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; }

        .attr-name { font-weight: 700; font-size: 1rem; color: #fff; font-family: 'JetBrains Mono', monospace; }

        .attr-card-body { padding: 1rem 1.25rem; }
        .attr-description { color: var(--gray-400); font-size: 0.85rem; margin-bottom: 0.75rem; line-height: 1.5; }
        .code-block { background: #1a1a1a; border-radius: 8px; padding: 1rem; position: relative; }
        .code-block::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--primary); border-radius: 8px 8px 0 0; }

        .copy-btn { position: absolute; top: 6px; right: 6px; background: var(--gray-700); border: none; color: var(--gray-400); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }

        .modal-body p { color: var(--gray-300); margin: 0.5rem 0; }
        .modal-body code { background: var(--gray-800); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85rem; }
        .modal-body pre { background: #1a1a1a; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
        .modal-body pre code { background: none; padding: 0; }
        .modal-body hr { border: none; border-top: 1px solid var(--gray-800); margin: 1.5rem 0; }

["Give","Illuminate\\Container\\Attributes\\Give","Gives a specific binding contextually.","use Illuminate\\Container\\Attributes\\Give;\n\n#[Give(PaymentGateway::class)]", "di"],
["Log","Illuminate\\Container\\Attributes\\Log","Injects a logger with a named channel.","use Illuminate\\Container\\Attributes\\Log;\n\n#[Log('custom')]", "di"],
["RouteParameter","Illuminate\\Container\\Attributes\\RouteParameter","Injects a route parameter value.","use Illuminate\\Container\\Attributes\\RouteParameter;\n\n#[RouteParameter('user')]", "di"],
["Scoped","Illuminate\\Container\\Attributes\\Scoped","Registers a class as a scoped singleton in the container.","use Illuminate\\Container\\Attributes\\Scoped;\n\n#[Scoped(PaymentService::class)]", "di"],
["Singleton","Illuminate\\Container\\Attributes\\Singleton","Registers a class as a singleton in the container.","use Illuminate\\Container\\Attributes\\Singleton;\n\n#[Singleton]", "di"],
["Storage","Illuminate\\Container\\Attributes\\Storage","Injects a storage disk instance.","use Illuminate\\Container\\Attributes\\Storage;\n\n#[Storage('local')]", "di"],
["Tag","Illuminate\\Container\\Attributes\\Tag","Injects all bindings tagged with a given tag.","use Illuminate\\Container\\Attributes\\Tag;\n\n#[Tag('workers')]", "di"]
];

var ATTRIBUTES = rawData.map(function(item) {
    return { name: item[0], namespace: item[1], description: item[2], example: item[3], category: item[4] };
});

var CATEGORIES = [
    { key: "eloquent", name: "Eloquent", icon: "📊" },
    { key: "queue", name: "Queue", icon: "📦" },
    { key: "console", name: "Console", icon: "⚙️" },
    { key: "controllers", name: "Controllers", icon: "🎛️" },
    { key: "form-requests", name: "Form Requests", icon: "📝" },
    { key: "testing", name: "Testing", icon: "🧪" },
    { key: "factories", name: "Factories", icon: "🏭" },
    { key: "api-resources", name: "API Resources", icon: "📡" },
    { key: "di", name: "Dependency Injection", icon: "🔌" }
];

// ========== FUNCTIONS ==========
function renderCategories() {
    var nav = document.getElementById("categoryNav");
    var html = "";
    for (var i = 0; i < CATEGORIES.length; i++) {
        var c = CATEGORIES[i];
        html += '<button class="category-btn" data-cat="' + c.key + '">' + c.icon + ' ' + c.name + '</button>';
    }
    nav.innerHTML = html;
    var btns = nav.querySelectorAll(".category-btn");
    for (var i = 0; i < btns.length; i++) {
        btns[i].onclick = function() {
            var cat = this.getAttribute("data-cat");
            for (var j = 0; j < btns.length; j++) btns[j].classList.remove("active");
            this.classList.add("active");
            filterByCategory(cat);
        };
    }
}

function renderAttributeCard(attr) {
    var link = attr.category + "/" + attr.name + ".md";
    return '<div class="col-md-6">' +
        '<div class="attr-card">' +
            '<div class="attr-card-header">' +
                '<span class="attr-name">#[' + attr.name + ']</span>' +
                '<span class="namespace-badge" title="' + attr.namespace + '">' + attr.namespace + '</span>' +
            '</div>' +
            '<div class="attr-card-body">' +
                '<p class="attr-description">' + attr.description + '</p>' +
                '<div class="code-block">' +
                    '<button class="copy-btn" onclick="copyCode(this)">Copy</button>' +
                    '<pre><code class="language-php">' + escapeHtml(attr.example) + '</code></pre>' +
                '</div>' +
                '<button class="see-more-btn" onclick="openModal(\'' + link + '\', \'' + attr.name + '\')">See more examples</button>' +
            '</div>' +
        '</div>' +
    '</div>';
}

function renderAttributes(list) {
    var grid = document.getElementById("attributesGrid");
    var grouped = {};
    for (var i = 0; i < list.length; i++) {
        var a = list[i];
        if (!grouped[a.category]) grouped[a.category] = [];
        grouped[a.category].push(a);
    }
    var html = "";
    var cats = Object.keys(grouped);
    for (var i = 0; i < cats.length; i++) {
        var catKey = cats[i];
        var cat = null;
        for (var j = 0; j < CATEGORIES.length; j++) {
            if (CATEGORIES[j].key === catKey) { cat = CATEGORIES[j]; break; }
        }
        var attrs = grouped[catKey];
        if (cat && attrs.length > 0) {
            html += '<section class="category-section" id="' + catKey + '">' +
                '<div class="category-header">' +
                    '<h2 class="category-title">' + cat.icon + ' ' + cat.name + '</h2>' +
                    '<span class="category-count">' + attrs.length + '</span>' +
                '</div>' +
                '<div class="row">';
            for (var k = 0; k < attrs.length; k++) {
                html += renderAttributeCard(attrs[k]);
            }
            html += '</div></section>';
        }
    }
    grid.innerHTML = html;
}

function escapeHtml(text) {
    var d = document.createElement("div");
    d.textContent = text;
    return d.innerHTML;
}

function copyCode(btn) {
    var code = btn.nextElementSibling.textContent;
    navigator.clipboard.writeText(code).then(function() {
        btn.textContent = "Copied!";
        setTimeout(function() { btn.textContent = "Copy"; }, 2000);
    });
}

var GITHUB_BASE = "https://raw.githubusercontent.com/MrPunyapal/laravel-attributes-list/refs/heads/feat/ai-skill/attributes/";

async function openModal(path, name) {
    var modal = document.getElementById("modal");
    var modalTitle = document.getElementById("modalTitle");
    var modalBody = document.getElementById("modalBody");
    modalTitle.textContent = "#[" + name + "]";
    modalBody.innerHTML = "Loading...";
    modal.classList.add("show");
    var url = GITHUB_BASE + path;
    try {
        var response = await fetch(url);
        if (!response.ok) throw new Error("Not found");
        var text = await response.text();
        var lines = text.split('\n');
        while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();
        var lastLine = lines[lines.length - 1] || '';
        if (lastLine.includes('Back to README')) {
            lines.pop();
            while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();
            if (lines[lines.length - 1] === '---') lines.pop();
            text = lines.join('\n');
        }
        modalBody.innerHTML = marked.parse(text);
    } catch (e) {
        modalBody.innerHTML = "<p style='color:#ff6b6b'>Could not load: " + url + "</p>";
    }
}

function closeModal() {
    document.getElementById("modal").classList.remove("show");
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeModal();
});

function filterByCategory(cat) {
    var list = ATTRIBUTES.filter(function(a) { return a.category === cat; });
    renderAttributes(list);
    document.getElementById("totalCount").textContent = list.length;
    var first = document.querySelector(".category-section");
    if (first) first.scrollIntoView({ behavior: "smooth" });
}

function filterBySearch(term) {
    var list = ATTRIBUTES.filter(function(a) {
        return (a.name + " " + a.description + " " + a.namespace).toLowerCase().indexOf(term.toLowerCase()) > -1;
    });
    if (list.length === 0) {
        document.getElementById("attributesGrid").innerHTML = "";
        document.getElementById("noResults").style.display = "";
    } else {
        document.getElementById("noResults").style.display = "none";
        renderAttributes(list);
    }
    document.getElementById("totalCount").textContent = list.length;
}

// ========== INIT ==========
document.getElementById("totalCount").textContent = ATTRIBUTES.length;
renderCategories();
renderAttributes(ATTRIBUTES);

var searchInput = document.getElementById("searchInput");
var searchTimeout;
searchInput.oninput = function(e) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(function() {
        var term = e.target.value.trim();
        if (term) {
            var btns = document.querySelectorAll(".category-btn");
            for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            filterBySearch(term);
        } else {
            renderAttributes(ATTRIBUTES);
            document.getElementById("totalCount").textContent = ATTRIBUTES.length;
        }
    }, 300);
};
